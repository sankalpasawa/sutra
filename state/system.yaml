#  Sutra — Typed System State (single source of truth)
#
#  This file is the ONLY place to edit protocols, directions, hooks, tiers,
#  and invariants. CLAUDE.md, settings.json, hook bundle, and OS core are
#  all OUTPUTS compiled from this file in Phase 2.
#
#  Do not edit generated markdown by hand. Edit this file, re-run compile.
#
#  Validate: node sutra/state/validate.mjs
#  Schema:   sutra/state/schema.json

meta:
  version: "1.9"
  schema: "1.0"
  updated: "2026-04-18"
  phase: 1
  roadmap: holding/research/2026-04-15-asawa-sutra-live-roadmap.md
  decisions: holding/DECISIONS.md
  caps:
    protocols_active_max: 8   # Phase 0 D-3
    directions_active_max: 20 # bumped 2026-04-17 (founder directive "go ahead") to admit D30 "Policy Ships With Mechanism"; closes billu/os/feedback-to-sutra/2026-04-15-policy-without-mechanism-rca.md
  override_schema: sutra/state/OVERRIDE-SCHEMA.md             # B5 (2026-04-18). Human-readable spec.
  override_schema_version: 1                                   # Bumps on backwards-incompatible field changes.
  override_schema_json: sutra/state/override-schema.json       # Declarative JSON Schema (draft-07).
  override_audit_log: .enforcement/override-audit.jsonl        # Single sink for governance-bypass records.
  override_implementation: sutra/package/hooks/lib/override-audit.sh  # Sole serializer; sourced by 5 governance hooks.
  plugin_architecture: sutra/marketplace/plugin/ARCHITECTURE.yaml   # v1.0.0+ — structured source for plugin components, flows, schemas, privacy. LLMs render visuals on demand; never persist ASCII art.
  conventions:
    sutra_freeze_marker: |
      Companies may drop a `.sutra-freeze` file at their repo root to block ALL
      hook propagation from `holding/hooks/verify-os-deploy.sh --push`. File contents
      (first line) is logged as the freeze reason. The marker is checked BEFORE any
      tier/drift logic — freeze always wins. Working-tree-dirty state ALSO blocks
      `--push` (auto-downgrades to dry-run); commit or stash to proceed. Introduced
      2026-04-17 (Wave 4 Asawa→Company hook propagation pipeline).

# ─── Tiers (per Phase 0 D-3, D-9) ─────────────────────────────────────────────
# Each tier picks which hooks ship and whether OS core copies into target.
# Claude-Code-only runtime for v1 (D-9).
tiers:
  - id: 1
    name: governance
    description: "Billu-style governance tool. Minimal. Boundary + routing/depth markers + SUTRA-CONFIG only. No engines."
    hooks_included: [enforce-boundaries, reset-turn-markers, dispatcher-pretool]
    includes_os_core: false
    includes_templates: true
    example_consumer: billu

  - id: 2
    name: product
    description: "DayFlow/Maze/PPR/Paisa-style product company. Full OS: engines, hooks, protocols, templates."
    hooks_included: null  # null = all
    includes_os_core: true
    includes_templates: true
    example_consumer: dayflow

  - id: 3
    name: platform
    description: "Meta — Sutra itself. Reserved for future protocol harvester + cross-company learning infra."
    hooks_included: null
    includes_os_core: true
    includes_templates: true
    example_consumer: sutra
    reserved: true

# ─── Protocols (Phase 0 D-3: cap 8 active) ────────────────────────────────────
# All 19 are listed. 8 active. 11 retired/absorbed per Phase 0 decision.
# A protocol with enforcement=hard MUST have a mechanism that blocks. Doctor enforces.
protocols:
  - id: PROTO-000
    name: Every Change Must Ship With Implementation
    status: active
    enforcement: soft
    upgrade_to_hard_at: phase-3
    mechanism: validate.mjs inverse coverage + test runner (current); doctor in Phase 3
    invariant_refs: [I-1]
    owner: sutra
    summary: Every change must satisfy the 6-part rule (DEFINED, CONNECTED, IMPLEMENTED, TESTED, DEPLOYED, OPERATIONALIZED) before shipping. Writing prose is not shipping. 6th criterion (OPERATIONALIZED) added 2026-04-20 per D30 — enforced via operationalization-check.sh hook for L0-L2 artifact classes. Phase 1 validate.mjs enforces criteria 1-5 at state-model commit time. Phase 3 doctor enforces all 6 at every repo commit.
    source: sutra/layer2-operating-system/PROTOCOLS.md

  - id: PROTO-004
    name: Keys in Env Vars Only
    status: active
    enforcement: hard
    scope: asawa-only
    mechanism: holding/hooks/dispatcher-pretool.sh Check 5 (PreToolUse exit 2; greps tool_input.content for Write and tool_input.new_string for Edit; SECRET_OVERRIDE override; .env files exempt)
    test: sutra/package/tests/test-d28-routing-gate.sh
    invariant_refs: [I-16]
    owner: sutra
    summary: No hardcoded API keys, secrets, tokens in source. Dispatcher blocks (exit 2) when the INCOMING post-edit content (Write content / Edit new_string) contains a matching literal. Remediation edits that REMOVE a secret still pass because the new_string carries no literal. Override via SECRET_OVERRIDE=1 with SECRET_OVERRIDE_REASON. Scope: Asawa-only until Phase 2 compiler ships hook to company installs.
    source: sutra/layer2-operating-system/PROTOCOLS.md

  - id: PROTO-006
    name: Process Discipline
    status: active
    enforcement: soft
    mechanism: CLAUDE.md + dispatcher routing check
    owner: sutra
    summary: Use the defined process. Don't ad-hoc when a protocol exists. Routing classification surfaces this before action.

  - id: PROTO-009
    name: Narration Is Not Artifact
    status: active
    enforcement: soft
    mechanism: dispatcher-pretool.sh
    owner: sutra
    summary: Files under os/ must be artifacts that stand alone, not conversational narration. Dispatcher warns on os/ writes.

  - id: PROTO-013
    name: Sutra Version Deploy
    status: active
    enforcement: soft
    upgrade_to_hard_at: phase-2
    mechanism: D27 depth-5 gate (current); compiler upgrades this in Phase 2
    invariant_refs: [I-2]
    owner: sutra
    summary: Every Sutra version change triggers a compile → reconcile → deploy cycle per tier. Phase 2 upgrades enforcement from soft to hard when the compiler ships.

  - id: PROTO-014
    name: Sutra Version Check (Client-Side)
    status: active
    enforcement: soft
    mechanism: CLAUDE.md session-start check + .claude/sutra-version manifest
    owner: sutra
    summary: Company sessions compare local sutra-version to upstream on start. Drift surfaces without forcing upgrade.

  - id: PROTO-015
    name: Verify Before Commit
    status: active
    enforcement: soft
    upgrade_to_hard_at: phase-3
    mechanism: agent behavior + estimation-enforcement.sh (current); pre-commit doctor in Phase 3
    invariant_refs: [I-3]
    owner: sutra
    summary: No commit lands without proportional verification. Depth 1 = grep; 2 = typecheck; 3+ = full suite. Phase 3 doctor upgrades this to hard.

  - id: PROTO-017
    name: Policy-to-Implementation Coverage
    status: active
    enforcement: soft
    upgrade_to_hard_at: phase-3
    mechanism: validate.mjs inverse coverage check (current); reconciler/doctor in Phase 3
    invariant_refs: [I-1, I-4, I-5]
    owner: sutra
    summary: For every active protocol/direction with enforcement=hard, a blocking hook exists AND is wired AND passes its test. validate.mjs enforces this at state-model commit time; Phase 3 doctor enforces at every commit.

  # ── Retired (11) — kept as historical record, not wired ────────────────────
  - id: PROTO-001
    name: Structure Before Creation
    status: retired
    reason: "Absorbed into reconciler invariant I-6 (no orphan files). Per Phase 0 D-3."
    source: sutra/layer2-operating-system/PROTOCOLS.md

  - id: PROTO-002
    name: Wait for Parallel Completion
    status: retired
    reason: "Agent-execution concern, not system invariant. Handled by TaskCreate/TaskGet in runtime."

  - id: PROTO-003
    name: Free Tier First
    status: retired
    reason: "Business heuristic, not runtime invariant. Per codex review: 'business heuristics should not be in kernel.'"

  - id: PROTO-005
    name: Self-Assess Before Foundational Work
    status: retired
    reason: "Subsumed by depth system (D2, D26). Depth 5 already requires self-assessment."

  - id: PROTO-007
    name: One Metric Per Feature
    status: retired
    reason: "Product discipline, moves to IDEA-SHAPING.md (Phase 5). Not a runtime invariant."

  - id: PROTO-008
    name: Follow the Sprint Sequence
    status: retired
    reason: "Project-management protocol, not OS enforcement. Per Phase 0 D-3 — v1 is deploy/verify/upgrade, not PM."

  - id: PROTO-010
    name: Version Focus
    status: retired
    reason: "Subsumed by PROTO-013 (Sutra Version Deploy) + PROTO-014 (Client-Side Version Check)."

  - id: PROTO-011
    name: Company Independence
    status: retired
    reason: "Absorbed by boundary hook (R4 fail-closed) + tier model. Mechanism is live; separate protocol isn't needed."

  - id: PROTO-012
    name: Ownership Model
    status: retired
    reason: "Business doctrine, moves to holding/ governance. Not portable Sutra canon."

  - id: PROTO-016
    name: Root Cause on Founder Correction
    status: retired
    reason: "Absorbed into D11 (Fix the Process). Single source for that rule."

  - id: PROTO-018
    name: Auto-Propagation on Version Bump
    status: retired
    reason: "Phase 0 D-7. Post-commit trigger disabled 2026-04-15. Phase 2 compiler replaces the mechanism."

  - id: PROTO-019
    name: External Peer Review on Portfolio Changes
    status: absorbed
    reason: "Becomes the reconciler itself in Phase 3. No separate protocol — doctor IS the codex-gate."

  - id: PROTO-020
    name: Plugin Identity Capture (Local-First)
    status: active
    enforcement: "SOFT"
    mechanism: "sutra/marketplace/plugin/lib/identity.sh captures git_user_name/github_login/os/hostname_hash. As of v2.0.3, local writes require telemetry_optin=true AND SUTRA_LEGACY_TELEMETRY=1 (matches PRIVACY.md in-memory-until-consent contract). Outbound push also gated behind SUTRA_LEGACY_TELEMETRY=1 per v2.0.0 privacy rewrite. Fleet attribution intentionally deferred — v2 default is local-only; re-enable via legacy flag or design a consent-gated channel (future protocol)."
    test: "sutra/marketplace/plugin/tests/unit/test-identity.sh + tests/integration/test-identity-stamp.sh"
    shipped: "2026-04-22 (plugin v1.9.0)"
    reason: "MVP shipped 2026-04-22 per founder direction 'solve it for everyone; ship MVP now'. Full-tier design parked at holding/research/2026-04-22-sutra-identity-capture-v17-design.md for v2."

  - id: PROTO-021
    name: BUILD-LAYER Declaration
    status: active
    enforcement: "HARD-on-code / SOFT-on-docs"
    mechanism: holding/hooks/build-layer-check.sh (PreToolUse Edit|Write)
    test: holding/hooks/tests/test-build-layer-check.sh
    summary: "Every task declares L0 plugin / L1 staging / L2 instance + ACTIVATION-SCOPE + TARGET-PATH + PROMOTION contract. HARD on holding/hooks/**, holding/departments/**, sutra/marketplace/plugin/**, sutra/os/charters/**. SOFT elsewhere. Override: BUILD_LAYER_ACK=1 BUILD_LAYER_ACK_REASON='<why>'."
    ledger: .enforcement/build-layer-ledger.jsonl
    design: holding/research/2026-04-23-build-layer-protocol-design.md
    codex_session: 019db709-bddc-77f0-8823-9b5e7aad0a96
    scope: sutra-core
    shipped_at: 2026-04-23

# ─── build_layer inventory (PROTO-021 support) ──────────────────────────────
# Layer classifications flow from holding/research/2026-04-23-build-layer-
# protocol-design.md §4 (Codex-amended counts: 10 L0 / 9 L1 / 21 L2).
# Rows added as artifacts are built, not retroactively. Query with:
#   yq '.build_layer[] | select(.layer == "L1") | .path' sutra/state/system.yaml

build_layer:
  enforced_paths:
    hard:
      - holding/hooks/**
      - holding/departments/**
      - sutra/marketplace/plugin/**
      - sutra/os/charters/**
    soft:
      - holding/research/**
      - sutra/archive/**
      - "**/*.md (research/docs shape)"
  whitelist:
    - .claude/**
    - .enforcement/**
    - .analytics/**
    - holding/checkpoints/**
    - holding/TODO.md
    - holding/hooks/hook-log.jsonl
    - "*.lock"
    - "~/.claude/projects/**/memory/**"
  defaults:
    promotion_deadline_days: 14
    auto_promotion_assistant: false
    retroactive_sweep: false
    declaration_cadence: per-task

# ─── Directions (Phase 0 D-4, D-6: cap 18, split core/ergonomics) ────────────
# Core = portable, ships with Sutra. Ergonomics = Asawa-only, not portable.
# Total cap 18. Current: 14 core + 4 ergonomics. Retired below with reason.

directions:
  core:
    - id: D2
      name: Thoroughness Scales With the Change
      status: active
      enforcement: hard
      mechanism: dispatcher-pretool.sh Check 10 (depth marker)
      test: sutra/package/tests/test-d28-routing-gate.sh
      summary: Full lifecycle every time; depth set by complexity/cost/impact, not user count or company stage.
      scope: sutra-core

    - id: D3
      name: Every Task Has a Sutra Path
      status: active
      enforcement: soft
      mechanism: lifecycle-check.sh (Stop event)
      summary: Sutra is an OS — every task starts with "what's the Sutra way?"
      scope: sutra-core

    - id: D6
      name: Directions Are Executable With Regression Tests
      status: active
      enforcement: soft
      upgrade_to_hard_at: phase-3
      mechanism: validate.mjs test runner (current); doctor in Phase 3
      invariant_refs: [I-1]
      summary: Every direction encoded with TRIGGER/CHECK/ENFORCEMENT + regression test. Prose alone is incomplete. Phase 3 doctor upgrades this to hard.
      scope: sutra-core

    - id: D10
      name: Test Everything in Production
      status: active
      enforcement: soft
      mechanism: test-in-production-check.sh (Stop event)
      summary: No protocol ships without deployment to a company and validation through a real feature.
      scope: sutra-core

    - id: D11
      name: Fix the Process, Not Just the Instance
      status: active
      enforcement: soft
      mechanism: process-fix-check.sh (PostToolUse)
      summary: Every bug fix includes root cause analysis + process improvement.
      scope: sutra-core

    - id: D12
      name: Architecture Awareness Before Creation
      status: active
      enforcement: soft
      mechanism: dispatcher-pretool.sh Check 4 (new path detector)
      summary: Before creating anything new, check SYSTEM-MAP. Surfaces drift.
      scope: sutra-core

    - id: D13
      name: Cascade Downstream Immediately
      status: active
      enforcement: hard
      scope: tier-local
      mechanism: holding/hooks/cascade-check.sh (PostToolUse exit 2; diff-restricted to TODO.md paths; CASCADE_ACK override)
      test: sutra/package/tests/test-d13-cascade.sh
      invariant_refs: [I-15]
      summary: Every L0-L2 change in the Asawa repo blocks the assistant response until a matching downstream TODO line is added to some TODO.md (staged or unstaged diff), or is explicitly deferred via CASCADE_ACK=1 with CASCADE_ACK_REASON. Companies inherit this gate only after Phase 2 compiler copies the hook into sutra/package/hooks/ and wires it into package/templates/settings.json — until then, sutra/package/hooks/cascade-check.sh is empty and company installs have no enforcement. Honest scope, not runtime lie.

    - id: D17
      name: Don't Miss Parallel Statements
      status: active
      enforcement: soft
      mechanism: agent behavior directive
      summary: Capture all founder statements in rapid succession. Sub-agents for parallel work.
      scope: sutra-core

    - id: D20
      name: Escalate Competing Priorities to Founder
      status: active
      enforcement: soft
      upgrade_to_hard_at: phase-3
      mechanism: AskUserQuestion (agent-enforced — agent-behavior, no hook harness yet)
      summary: When 2+ high-priority items compete, present the tension — don't decide unilaterally.
      scope: sutra-core

    - id: D22
      name: OS Deploys by Judgment, Not by Default
      status: active
      enforcement: soft
      mechanism: version-governance.sh + PROTO-014 client-side check
      summary: PULL (company decides) is default. PUSH is explicit override.
      scope: sutra-core

    - id: D23
      name: Push Back With Approval Gates
      status: active
      enforcement: soft
      upgrade_to_hard_at: phase-3
      mechanism: AskUserQuestion on detected conflict (agent-behavior, no hook harness yet)
      summary: System throws back on conflict with existing principles. No silent overrides.
      scope: sutra-core

    - id: D26
      name: Gear = Decomposition Granularity
      status: active
      enforcement: soft
      mechanism: depth system (shared with D2)
      summary: Gear 1-5 controls decomposition granularity. Speed vs precision trade-off. Task-specific, not company-specific.
      scope: sutra-core

    - id: D27
      name: Sutra→Company Deploys Run at Depth 5
      status: active
      enforcement: hard
      mechanism: dispatcher-pretool.sh Check 11 (sutra-deploy-depth5 marker)
      test: sutra/package/tests/test-d28-routing-gate.sh
      summary: Any edit touching sutra/** or {company}/os/** runs at Depth 5 (exhaustive).
      scope: sutra-core

    - id: D28
      name: Per-Turn Routing & Depth Enforcement
      status: active
      enforcement: hard
      mechanism: dispatcher-pretool.sh Checks 9+10 + reset-turn-markers.sh (UserPromptSubmit)
      test: sutra/package/tests/test-d28-routing-gate.sh
      summary: Every Write/Edit requires fresh INPUT/TYPE/ROUTE block + TASK/DEPTH block. Markers cleared every founder turn.
      scope: sutra-core

    - id: D29
      name: Chunk LLM Delegations to Fit Server Budgets
      status: active
      enforcement: soft
      upgrade_to_hard_at: phase-3
      mechanism: agent-behavior directive (current); Phase 3 doctor adds pre-dispatch size lint
      summary: Any task delegated to an external LLM (codex review/consult/challenge, sub-agent dispatch, managed agent) must fit within ~5 minutes server-side. Pre-plan chunking; if a review would need deep reasoning over many files, split the underlying task into smaller chunks each with its own review. If a dispatched review times out or exceeds budget, kill it and retry with smaller chunks — don't wait longer. Applies to Claude↔Codex loops, Claude↔Claude sub-agents, and any network-bound LLM call. Founder directive 2026-04-16 after 15-min PROTO-004 review stalled. Abstraction-level rule about how Sutra deals with LLMs; ships with Sutra to every company.
      scope: sutra-core

    - id: D30
      name: Policy Ships With Mechanism
      status: active
      enforcement: soft
      upgrade_to_hard_at: phase-3
      mechanism: holding/hooks/policy-only-sensor.sh (Stop event + on-demand); extends D13 cascade
      test: sutra/package/tests/test-d30-policy-only-sensor.sh
      summary: A T1/HARD principle is not shipped until all four hold — (1) hook file exists at target location, (2) hook registered in the correct settings.json, (3) hook fires on a real call (one test invocation verifies), (4) hook logs to designated audit trail. Until all four hold, the principle is marked `POLICY-ONLY since YYYY-MM-DD` in holding/DIRECTION-ENFORCEMENT.md. Sensor grep for POLICY-ONLY entries older than window (default 7d) — escalates to CEO of Asawa. Cascade rule (extends D13) — when a T1 hook ships at a parent layer (Asawa/holding), sibling/child layers (Sutra companies, billu) must receive the hook or record `INHERIT-FROM: {path}` in their settings before the parent ship is considered complete. Founder directive 2026-04-17 accepting D30 candidate from billu/os/feedback-to-sutra/2026-04-15-policy-without-mechanism-rca.md. Closes the "write policy, hope LLM complies" failure mode at the framework level.
      scope: tier-local

  ergonomics:
    - id: D16
      name: Executive Documents as HTML
      status: active
      enforcement: soft
      scope: asawa-only
      mechanism: agent behavior directive
      summary: HOD meetings, portfolio reviews, strategy docs get HTML with visual dashboard elements. Asawa founder preference.

    - id: D19
      name: Daily Satisfaction Report
      status: active
      enforcement: soft
      scope: asawa-only
      mechanism: session-end-satisfaction.sh (Stop event)
      summary: Session-end "Your Day" dashboard showing founder vs LLM contributions. Asawa founder feedback-loop preference.

    - id: D21
      name: Speed of Building Is a Factor
      status: active
      enforcement: soft
      scope: asawa-only
      mechanism: agent behavior directive
      summary: When quality is equal, pick faster approach. Asawa velocity preference.

    - id: D25
      name: Technical and Scientific Rigor
      status: active
      enforcement: soft
      scope: asawa-only
      mechanism: agent behavior / voice
      summary: Use proper technical terminology. Asawa voice preference (codex: "it's a communication-style preference"). Moves with founder, not with Sutra.

  # ── Retired (10 — to hit cap 18: 14 core + 4 ergonomics = 18) ─────────────
  retired:
    - id: D1
      name: Simplicity Through Human Confidence
      reason: "Aspirational. No mechanism — agent self-assessment only. Absorbed as a design principle in THESIS.md (Phase 7)."
    - id: D4
      name: Model Directions as Living Forces
      reason: "Meta — subsumed by the state model itself. This file is D4 made mechanical."
    - id: D5
      name: External Research at Every Level
      reason: "Advisory. Not a runtime invariant. Moves to IDEA-SHAPING.md (Phase 5)."
    - id: D7
      name: Expand Then Contract
      reason: "Aspirational. Absorbed by doctor cap enforcement (I-7, I-8)."
    - id: D8
      name: Output-Driven Metrics Everywhere
      reason: "Business/measurement discipline. Not kernel. Moves to IDEA-SHAPING.md."
    - id: D9
      name: Recursive Estimation Engine
      reason: "Subsumed by D2/D26 (depth system) + estimation-enforcement.sh (soft)."
    - id: D14
      name: Don't Stop
      reason: "Aspirational. Agent behavior, not invariant."
    - id: D15
      name: 70/20/10 — Products First
      reason: "Asawa-specific allocation. If it returns, it lives in ergonomics. Currently retired to hit cap."
    - id: D18
      name: Packaging Before Launch
      reason: "v1 deliverable (roadmap Phase 4), not an ongoing invariant."
    - id: D24
      name: Parallelization While Evolving Is Its Own Project
      reason: "Meta-observation about this project, not a directive."

# ─── Hooks (Phase 0 D-9: Claude-Code-only format) ────────────────────────────
# Each hook: file (relative to .claude/hooks/sutra/), event, matcher, tier_visibility,
# blocking (exit nonzero blocks the tool call), implements (protocols/directions it enforces).
hooks:
  - file: dispatcher-pretool.sh
    event: PreToolUse
    matcher: "Edit|Write|Bash"
    tier_visibility: [1, 2, 3]
    blocking: true
    implements: [PROTO-004, PROTO-009, D2, D12, D27, D28]
    # D13 removed 2026-04-16: dispatcher-pretool has no actual cascade check —
    # D13 is enforced by cascade-check.sh (PostToolUse, exit 2). Coverage lie fixed.

  - file: policy-coverage-gate.sh
    event: PreToolUse
    matcher: "Edit|Write|Bash"
    tier_visibility: [2, 3]
    blocking: false
    implements: [PROTO-017]

  - file: enforce-boundaries.sh
    event: PreToolUse
    matcher: "Edit|Write"
    tier_visibility: [1, 2, 3]
    blocking: true
    implements: []  # boundary isolation — foundational, not tied to a direction
    notes: "R4 fail-closed (2026-04-15). Defaults role via .claude/active-role."

  - file: reset-turn-markers.sh
    event: UserPromptSubmit
    matcher: ""
    tier_visibility: [1, 2, 3]
    blocking: false
    implements: [D28]

  - file: dispatcher-stop.sh
    event: Stop
    matcher: ""
    tier_visibility: [2, 3]
    blocking: false
    implements: [D3, D10, D11, D13]

  - file: agent-completion-check.sh
    event: PostToolUse
    matcher: "Bash|Edit|Write"
    tier_visibility: [2, 3]
    blocking: false
    implements: []

  - file: onboarding-self-check.sh
    event: PostToolUse
    matcher: "Write"
    tier_visibility: [2, 3]
    blocking: false
    implements: []

  - file: process-fix-check.sh
    event: PostToolUse
    matcher: "Edit|Write"
    tier_visibility: [2, 3]
    blocking: false
    implements: [D11]

  - file: cascade-check.sh
    event: PostToolUse
    matcher: "Edit|Write"
    tier_visibility: [2, 3]
    blocking: true
    implements: [D13]
    notes: "D13 HARD gate (2026-04-16). PostToolUse exit 2 — edit lands on disk but blocks assistant response until matching downstream TODO is added or CASCADE_ACK override is set."

# ─── Invariants (what doctor checks on every commit) ─────────────────────────
# Each invariant is machine-checkable. Doctor walks these; fails loud on violation.
invariants:
  - id: I-1
    name: Policy-to-mechanism coverage
    statement: "For every protocol or direction with status=active AND enforcement=hard, a hook with blocking=true exists in hooks[] AND the hook file is present on disk AND its test passes."
    enforces: [PROTO-000, PROTO-017, D6]
    severity: fail  # doctor exits non-zero on violation

  - id: I-2
    name: Version deploy completeness
    statement: "When meta.version changes, every company's .claude/sutra-version is updated AND doctor was re-run on each tier's install."
    enforces: [PROTO-013]
    severity: fail

  - id: I-3
    name: Verify before commit
    statement: "Pre-commit runs doctor. Exit zero required unless commit trailer contains 'Doctor-Override:' with reason."
    enforces: [PROTO-015]
    severity: fail

  - id: I-4
    name: Declared hooks installed
    statement: "Every hook with tier T in tier_visibility[] is present on disk in tier-T installs: declared ⊆ installed."
    enforces: [PROTO-017]
    severity: fail

  - id: I-5
    name: Installed hooks registered
    statement: "Every hook file in .claude/hooks/sutra/ is referenced in .claude/settings.json for a real event: installed ⊆ registered."
    enforces: [PROTO-017]
    severity: fail

  - id: I-6
    name: No orphan files
    statement: "Every file under os/ or .claude/hooks/sutra/ is either declared in this state model OR marked user_hooks in settings.json."
    enforces: []
    severity: warn

  - id: I-7
    name: Protocol budget
    statement: "count(protocols where status=active) <= meta.caps.protocols_active_max"
    enforces: [D7-absorbed]
    severity: fail

  - id: I-8
    name: Direction budget
    statement: "count(directions.core where status=active) + count(directions.ergonomics where status=active) <= meta.caps.directions_active_max"
    enforces: [D7-absorbed]
    severity: fail

  - id: I-9
    name: Boundary fail-closed
    statement: "enforce-boundaries.sh defaults to BLOCKED when ACTIVE_ROLE cannot be resolved from env, .claude/active-role, or repo inference."
    enforces: []
    severity: fail
    notes: "R4 fix 2026-04-15."

  - id: I-10
    name: Per-turn marker reset
    statement: "UserPromptSubmit event clears .claude/input-routed, .claude/depth-registered, .claude/sutra-deploy-depth5."
    enforces: [D28]
    severity: fail

  - id: I-11
    name: Codex review on every significant change
    statement: "Before every commit touching code/hooks/governance (.mjs, .sh, .js, .ts, .tsx, .py, .md, holding/, sutra/layer2, .claude/settings.json), a fresh codex review must have been performed: marker file .enforcement/codex-reviews/.last-review must exist and be <600s (10 min) old. Otherwise pre-commit exits 1."
    enforces: [PROTO-000, PROTO-015]
    severity: fail
    notes: "Founder directive 2026-04-16 — lifted SOFT→HARD via I-14 ladder. Mechanism: .git/hooks/pre-commit section (4). MARKER PRODUCER — the agent must `touch .enforcement/codex-reviews/.last-review` after running /codex review (or codex review --uncommitted) as part of the workflow; there is no auto-producer yet. Phase 3 doctor absorbs PROTO-019 and auto-produces the marker when a review verdict artifact lands. Override: CODEX_OVERRIDE=1 CODEX_OVERRIDE_REASON='<why>' git commit ... (logged to .enforcement/codex-reviews/gate-log.jsonl). Emergency escape: git commit --no-verify. Scope: Asawa-local — .git/hooks is untracked so fresh clones do not inherit; Phase 2 compiler must ship a tracked pre-commit under .husky/ or equivalent before clients see this gate."

  - id: I-12
    name: Daily test framework run
    statement: "run-tests.mjs executes at least once per 24h via scheduled agent; results go to .enforcement/test-history.log."
    enforces: [PROTO-017]
    severity: warn
    notes: "Founder directive 2026-04-16: daily cadence via codex-driven cron."

  - id: I-14
    name: No-duplication gate before creation
    statement: "Before creating any new .sh/.mjs/.md script or doctrine file, the agent must grep the repo for existing artifacts of similar name or purpose and refuse to create if matches found (override requires explicit rationale in commit message)."
    enforces: [PROTO-001]
    severity: warn
    notes: "Founder-observed failure mode 2026-04-16 — agent created holding/scripts/evolution-cycle.sh despite existing docs/superpowers/specs/2026-04-05-evolution-protocol-v2.md, and holding/scripts/verify-company-deploy.sh despite existing holding/hooks/verify-os-deploy.sh. D12/PROTO-001 warned but didn't block. Phase 3: promote to hard — dispatcher greps name+keyword similarity, blocks on match without --override-duplication trailer."

  - id: I-16
    name: No hardcoded secrets in tracked files
    statement: "Any tracked non-.env file must not contain a literal matching (api_key|secret_key|password|token)\\s*[:=]\\s*['\"][A-Za-z0-9_-]{20,} unless the commit was created with SECRET_OVERRIDE=1 and a logged SECRET_OVERRIDE_REASON."
    enforces: [PROTO-004]
    severity: fail
    notes: "Founder directive 2026-04-16 — lift PROTO-004 SOFT→HARD via I-14 ladder. Mechanism: dispatcher-pretool.sh Check 5 greps matching file content at PreToolUse and exits 2 on match. .env/*.env.* files exempt (they ARE the env vars). Override: SECRET_OVERRIDE=1 SECRET_OVERRIDE_REASON='<why>' logged to .enforcement/routing-misses.log. Gap: Write tool with new file path not yet inspected (needs stdin tool_input.content extraction) — Phase 3 doctor closes this gap. Scope: Asawa-runtime only until Phase 2 compiler ships to companies."

  - id: I-15
    name: Cascade evidence on governance changes
    statement: "Any edit under holding/** or sutra/layer2-operating-system/** must add a matching TODO line to a TODO.md file in the staged or unstaged diff (line starting with '+' and containing TODO plus the changed file stem/basename/relpath), or carry CASCADE_ACK=1 with CASCADE_ACK_REASON."
    enforces: [D13]
    severity: fail
    notes: "Founder directive 2026-04-16 — lift D13 SOFT→HARD via I-14 ladder. Mechanism: holding/hooks/cascade-check.sh greps diff restricted to TODO.md pathspec for TODO additions referencing the changed file's stem/basename/relpath (regex-escaped); blocks (exit 2) if no evidence and no override. Scope: Asawa-runtime only — sutra/package/hooks/cascade-check.sh is empty, Phase 2 compiler ships the runtime copy to companies. Phase 3 doctor reconciles diff evidence repo-wide pre-commit."

  - id: I-13
    name: Portfolio deploy readiness
    statement: "For every active company in companies[], verify-company-deploy.sh reports READY. INCOMPLETE means Sutra is NOT enforcing in that company session despite doctrine being present."
    enforces: [PROTO-013, PROTO-014]
    severity: warn
    notes: "Founder directive 2026-04-16 — answers 'is Sutra deployed fully when a downstream company builds something?'. Mechanism: holding/scripts/verify-portfolio-deploy.sh. Phase 3 doctor runs this on every commit. Current reading 2026-04-16: 1 READY (billu), 4 INCOMPLETE (dayflow, maze, ppr, paisa)."

