# ─── Operationalization (D30 — 2026-04-20) ────────────────────────────────────
# Tracks enforcement of the 6-section ops plan required in new L0-L2 artifacts.
# Governed by: sutra/os/charters/OPERATIONALIZATION.md
# Standard:    holding/OPERATIONALIZATION-STANDARD.md
# Hook:        holding/hooks/operationalization-check.sh
operationalization:
  # Per-repo cutover SHAs — each key is a git repo root (parent or submodule name)
  # Files existing at these SHAs in their respective repos are grandfathered.
  cutover_commits:
    parent: "9670d80ee42fe99b11f17ecafda587151d06464b"   # asawa-holding/ HEAD^ at V1 land
    sutra:  "b103a98a2947386a6042369285eb30a43a61bbc2"    # sutra submodule HEAD^ at V1 land
  # Backward-compat alias (deprecated): older hook versions read cutover_commit; aliases to parent.
  cutover_commit: "9670d80ee42fe99b11f17ecafda587151d06464b"
  version: v1
  created: 2026-04-20
  enforcement_mode: hard           # per founder 2026-04-20 (no SOFT ladder, no override)
  enforced_paths:
    tier_a:
      - "sutra/os/charters/*.md"
      - "sutra/**/protocols/PROTO-*.md"
      - "sutra/**/d-engines/*.md"
      - "sutra/**/engines/*.md"
      - "holding/departments/*/CHARTER.md"
      - "sutra/os/SUTRA-CONFIG.md"
      - "*/os/SUTRA-CONFIG.md"
    tier_b:
      - "holding/hooks/*.sh"
      - "sutra/package/hooks/*.sh"
      - "sutra/layer4-practice-skills/**/*.md"
      - "sutra/package/bin/*.sh"
      - "sutra/package/bin/*.mjs"
      - ".claude/commands/*.md"
      - "holding/departments/*/*.sh"
  exempt_paths:
    - "holding/research/*.md"
    - "**/TODO.md"
    - "**/BACKLOG.md"
    - "**/CHANGELOG.md"
    - "**/MEMORY.md"
    - ".claude/**"
    - ".enforcement/**"
    - ".analytics/**"
    - "*.log"
    - "*.jsonl"
    - "holding/checkpoints/**"
  semantic_change_thresholds:
    min_lines_changed: 5   # added+removed combined, excluding pure whitespace
    heading_change: true   # any +/- line matching ^#+ is semantic
    table_row_change: true # any +/- line matching ^\|.*\| is semantic
  active_artifacts: []  # populated as artifacts get ops sections and are tracked
