name: Deploy website to Vercel

# Mirrors the GH Pages deploy: every push to main that touches website/**
# triggers a Vercel production deploy AND re-aliases sutra-os.vercel.app
# to the new deployment URL. Without the alias step, sutra-os keeps pointing
# at the previous deploy (Vercel doesn't auto-alias on `vercel deploy`).

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

env:
  VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project config
        working-directory: ./website
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=$VERCEL_TOKEN

      - name: Build prod artifact
        working-directory: ./website
        run: |
          vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel (prod)
        id: deploy
        working-directory: ./website
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $DEPLOY_URL"

      - name: Re-alias sutra-os.vercel.app to new deploy
        working-directory: ./website
        run: |
          vercel alias set "${{ steps.deploy.outputs.deploy_url }}" \
            sutra-os.vercel.app \
            --token=$VERCEL_TOKEN
          echo "Aliased sutra-os.vercel.app → ${{ steps.deploy.outputs.deploy_url }}"

      - name: Verify alias is live + serving fresh content
        run: |
          sleep 5
          curl -fsI https://sutra-os.vercel.app/ | head -3
          echo
          echo "Title: $(curl -fsSL https://sutra-os.vercel.app/ | grep -oE '<title>[^<]+</title>' | head -1)"
