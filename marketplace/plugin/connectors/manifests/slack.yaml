# Sutra Connectors — Slack reference manifest (v0)
# Schema: holding/research/2026-04-30-connectors-LLD.md §2.2
# Validator: sutra/marketplace/plugin/connectors/lib/manifest.ts (validateManifest)
# Status: FIRST reference manifest — proves the format end-to-end.
# v0 scenarios: DayFlow eng channel reads, Asawa #ops reads, gated post-message.

schemaVersion: '1'
name: slack
description: >-
  Slack workspace connector. Read channel messages, post messages with
  founder-in-loop approval at high depth. Tier-scoped: T1 full fleet, T2
  scoped to own channels, T3 scoped to own product channels, T4 license-bound.
composioToolkit: slack

integration:
  kind: 'direct'
  target: 'slack-direct'

capabilities:
  # ---- READ ----
  - id: 'slack:read-channel:#*'
    action: read
    resourcePattern: '#*'
    minDepth: 1
    approvalRequired: false
    costEstimate: free

  - id: 'slack:read-channel:#dayflow-eng'
    action: read
    resourcePattern: '#dayflow-eng'
    minDepth: 1
    approvalRequired: false
    costEstimate: free

  - id: 'slack:read-channel:#ops'
    action: read
    resourcePattern: '#ops'
    minDepth: 1
    approvalRequired: false
    costEstimate: free

  - id: 'slack:read-channel:#testlify-status'
    action: read
    resourcePattern: '#testlify-status'
    minDepth: 1
    approvalRequired: false
    costEstimate: free

  - id: 'slack:read-channel:#dharmik-build'
    action: read
    resourcePattern: '#dharmik-build'
    minDepth: 1
    approvalRequired: false
    costEstimate: free

  # Public-prefix read — licensed for T4 (external Sutra users). ONLY public
  # channels (e.g. #public-launch, #public-announce). Asawa-internal channels
  # (#ops, #dayflow-eng, etc.) are intentionally excluded from this prefix.
  - id: 'slack:read-channel:#public-launch'
    action: read
    resourcePattern: '#public-*'
    minDepth: 1
    approvalRequired: false
    costEstimate: free

  # Glob-id decl — discovered by findCapabilityDecl glob fallback (iter 12).
  # This is the decl that backs T4's 'slack:read-channel:#public-*' tier entry
  # for ARBITRARY public channels (e.g. #public-announce). The literal
  # #public-launch decl above remains for exact-id callers (e.g. T1 post path).
  - id: 'slack:read-channel:#public-*'
    action: read
    resourcePattern: '#public-*'
    minDepth: 1
    approvalRequired: false
    costEstimate: free

  # ---- POST ----
  # Generic post: D3+ floor, founder approval required at write time.
  - id: 'slack:post-message:#*'
    action: write
    resourcePattern: '#*'
    minDepth: 3
    approvalRequired: true
    costEstimate: cents

  # Public-launch channel: D5 mandatory. Highest blast radius.
  - id: 'slack:post-message:#public-launch'
    action: write
    resourcePattern: '#public-launch'
    minDepth: 5
    approvalRequired: true
    costEstimate: cents

# Tier access — references concrete capability ids or glob prefixes that
# resolve to known ids (per matchesKnownCapabilityPrefix). Connector and
# action segments are never bare '*' (would be overbroad).
tierAccess:
  # T1 (Asawa): full fleet incl. post + public-launch
  T1:
    - 'slack:read-channel:#*'
    - 'slack:post-message:#*'
    - 'slack:post-message:#public-launch'

  # T2 (DayFlow / Billu / Paisa): read own scoped channels, post with approval
  T2:
    - 'slack:read-channel:#dayflow-eng'
    - 'slack:post-message:#*'

  # T3 (Testlify / Dharmik): read only their own product channels
  T3:
    - 'slack:read-channel:#testlify-status'
    - 'slack:read-channel:#dharmik-build'

  # T4 (external Sutra users): license-bound — public-prefix only.
  # Excludes Asawa-internal channels (#ops, #dayflow-eng, #testlify-status,
  # #dharmik-build) — those are NOT in the licensed surface for fleet adopters.
  # Concrete licensed reads will be added per-customer at v1.x; v0 ships only
  # the public-channel-shaped pattern as the safe default.
  T4:
    - 'slack:read-channel:#public-*'

# Fields appended to every audit event for forensic replay.
auditFields:
  - channel
  - thread_ts
  - team_id
  - user_id

# Paths scrubbed from response payloads (router post-call) AND audit args
# (audit-sink pre-write). Both shapes share the manifest path grammar — paths
# are relative to the value being redacted (no `response.` wrapper). Composio
# returns the raw object; our router applies these paths directly.
redactPaths:
  - 'tokens'
  - 'access_token'
  - 'bot_access_token'
  - 'user.email'
  - 'user.real_name'
  - 'user.profile.email'
  - 'user.profile.phone'
  - 'users[*].email'
  - 'users[*].real_name'
  - 'users[*].profile.email'
  - 'users[*].profile.phone'
